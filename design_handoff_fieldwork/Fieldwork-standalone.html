  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

d;\n\n  --color-accent-2-100: #fff3e4;\n  --color-accent-2-200: #ffe3be;\n  --color-accent-2-300: #f5cd96;\n  --color-accent-2-400: #dbaf70;\n  --color-accent-2-500: #bc8f4e;\n  --color-accent-2-600: #9b7232;\n  --color-accent-2-700: #79561f;\n  --color-accent-2-800: #573d14;\n  --color-accent-2-900: #382810;\n\n  --font-heading: \"Cormorant Garamond\", system-ui, sans-serif;\n  --font-heading-weight: 600; /* review round 3: bold retired — semibold is the\n     interface headings' ceiling (they need the weight at small sizes); display\n     text goes lighter still, to the normal cut (see the deck) */\n  --font-body: \"Lora\", system-ui, sans-serif;\n\n  --space-1: 4.6px;\n  --space-2: 9.2px;\n  --space-3: 13.8px;\n  --space-4: 18.4px;\n  --space-6: 27.6px;\n  --space-8: 36.8px;\n\n  --radius-sm: 2px;\n  --radius-md: 4px;\n  --radius-lg: 7px;\n\n  /* Elevation — derived from the ground: soft ink-tinted shadows on a\n     light theme, a hairline edge + ambient darkness on a dark one. */\n  --shadow-sm: 0 1px 2px color-mix(in srgb, #2d2b2b 14%, transparent);\n  --shadow-md: 0 3px 10px color-mix(in srgb, #2d2b2b 16%, transparent);\n  --shadow-lg: 0 12px 32px color-mix(in srgb, #2d2b2b 22%, transparent);\n}\n\nbody {\n  background: var(--color-bg);\n  color: var(--color-text);\n  font-family: var(--font-body);\n}\nh1, h2, h3, h4 { font-family: var(--font-heading); font-weight: var(--font-heading-weight); }\n\n.plate{filter:sepia(0.22) saturate(0.82) contrast(1.05);box-sizing:border-box;\n  border:6px solid var(--color-surface);outline:1px solid var(--color-divider)}\n\n/* ══════════════════════════════════════════════════════════════════════════\n   Components — built with the tokens above. Plain CSS\n   on plain HTML: no JavaScript, no build step. Each class is documented in\n   readme.md and demonstrated in foundations/ and components/.\n   ══════════════════════════════════════════════════════════════════════ */\n\n*, *::before, *::after { box-sizing: border-box; }\nbody { margin: 0; font-size: 15px; line-height: 1.55; font-weight: 400; }\nh1, h2, h3, h4, h5, h6 {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  line-height: 1.12; letter-spacing: -0.015em; margin: 0 0 var(--space-2);\n}\nh1 { font-size: 42px; }\nh2 { font-size: 32px; }\nh3 { font-size: 25px; }\nh4 { font-size: 20px; }\nh5 { font-size: 16px; }\nh6 { font-size: 13px; }\nh6 { letter-spacing: 0.08em; text-transform: uppercase; }\np { margin: 0 0 var(--space-3); }\na { color: var(--color-accent); text-underline-offset: 3px; }\nimg { display: block; max-width: 100%; }\nfigure { margin: 0; }\nfigcaption {\n  font-size: 11px; margin-top: var(--space-1);\n  color: color-mix(in srgb, var(--color-text) 55%, transparent);\n}\n.text-muted { color: color-mix(in srgb, var(--color-text) 55%, transparent); }\n:focus { outline: none; }\n:focus-visible { outline: 2px solid var(--color-accent); outline-offset: 2px; }\n::selection { background: color-mix(in srgb, var(--color-accent) 30%, transparent); }\n\n/* — rules — */\n.hr {\n  height: 1px; border: 0; margin: var(--space-4) 0;\n  background: var(--color-divider);\n}\n\n/* — buttons — */\n.btn {\n  display: inline-flex; align-items: center; justify-content: center; gap: 6px;\n  cursor: pointer; text-decoration: none;\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 13px; line-height: 1.2; color: var(--color-text);\n  background: transparent; border: 1px solid transparent;\n  padding: calc(var(--space-2) * 0.85) var(--space-3);\n  border-radius: var(--radius-md);\n}\n.btn svg { display: block; }\n.btn:disabled { opacity: 0.45; cursor: not-allowed; }\n.btn-primary { color: var(--color-accent); border-color: var(--color-accent); }\n.btn-primary:hover { background: color-mix(in srgb, var(--color-accent) 12%, transparent); }\n.btn-primary:active { background: color-mix(in srgb, var(--color-accent) 22%, transparent); }\n.btn-secondary { border-color: var(--color-divider); }\n.btn-secondary:hover { background: color-mix(in srgb, var(--color-text) 7%, transparent); }\n.btn-secondary:active { background: color-mix(in srgb, var(--color-text) 14%, transparent); }\n.btn-ghost { color: var(--color-accent); padding-inline: var(--space-1); }\n.btn-ghost:hover { background: color-mix(in srgb, var(--color-accent) 10%, transparent); }\n.btn-ghost:active { background: color-mix(in srgb, var(--color-accent) 18%, transparent); }\n.btn-icon { width: 34px; height: 34px; padding: 0; }\n.btn-block { width: 100%; margin-top: var(--space-2); }\n\n/* — forms — */\n.field > label {\n  display: block; font-size: 12px; margin-bottom: 5px;\n  color: color-mix(in srgb, var(--color-text) 70%, transparent);\n}\n.input {\n  width: 100%; min-height: 36px; padding: 6px 10px; font: inherit;\n  font-size: 14px; color: var(--color-text); caret-color: var(--color-accent);\n  background: transparent;\n  border: 1px solid var(--color-divider); border-radius: var(--radius-md);\n}\n.input:hover { border-color: color-mix(in srgb, var(--color-text) 45%, transparent); }\n.input:focus-visible { border-color: var(--color-accent); outline-offset: 0; }\ntextarea.input { min-height: 90px; resize: vertical; }\n.radio { display: inline-flex; align-items: center; gap: 8px; cursor: pointer; font-size: 14px; }\n.radio input, .seg-opt input {\n  position: absolute; opacity: 0; width: 0; height: 0; pointer-events: none;\n}\n.radio .dot {\n  width: 16px; height: 16px; flex: none; border-radius: 50%;\n  border: 1.5px solid var(--color-divider);\n}\n.radio:hover .dot { border-color: var(--color-accent); }\n.radio input:checked + .dot {\n  border-color: var(--color-accent); background: var(--color-accent);\n  box-shadow: inset 0 0 0 4px var(--color-bg);\n}\n.radio input:focus-visible + .dot { outline: 2px solid var(--color-accent); outline-offset: 2px; }\n.seg {\n  display: inline-flex; overflow: hidden;\n  border: 1px solid var(--color-divider); border-radius: var(--radius-md);\n}\n.seg-opt {\n  display: inline-flex; align-items: center; gap: 6px;\n  padding: 7px 12px; font-size: 13px; cursor: pointer;\n}\n.seg-opt + .seg-opt { border-left: 1px solid var(--color-divider); }\n.seg-opt:has(input:checked) { color: var(--color-accent); box-shadow: inset 0 0 0 1px var(--color-accent); }\n.seg-opt:not(:has(input:checked)):hover { background: color-mix(in srgb, var(--color-text) 7%, transparent); }\n.seg-opt:has(input:focus-visible) { outline: 2px solid var(--color-accent); outline-offset: -2px; }\n\n/* — cards — */\n.card {\n  display: flex; flex-direction: column; gap: var(--space-2);\n  padding: var(--space-3); border-radius: var(--radius-md); background: transparent; border: 1px solid var(--color-divider);\n}\n.card-kicker { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--color-accent); }\n.card-title {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 17px; line-height: 1.2;\n}\n.card-body { margin: 0; font-size: 13px; opacity: 0.8; flex: 1; }\n.card-meta {\n  display: flex; align-items: center; gap: 6px; font-size: 11px;\n  color: color-mix(in srgb, var(--color-text) 50%, transparent);\n}\n.elev-sm { box-shadow: var(--shadow-sm); }\n.elev-md { box-shadow: var(--shadow-md); }\n.elev-lg { box-shadow: var(--shadow-lg); }\n\n/* — tags — */\n.tag {\n  display: inline-flex; align-items: center; font-size: 11px;\n  letter-spacing: 0.02em; padding: 3px 10px;\n  border-radius: calc(var(--radius-md) * 0.75);\n}\n.tag-accent { background: var(--color-accent-100); color: var(--color-accent-800); }\n.tag-accent-2 { background: var(--color-accent-2-100); color: var(--color-accent-2-800); }\n.tag-neutral { background: var(--color-neutral-100); color: var(--color-neutral-800); }\n.tag-outline { border: 1px solid var(--color-accent); color: var(--color-accent); }\n\n/* — navigation — */\n.nav {\n  display: flex; align-items: center; gap: var(--space-4);\n  padding: var(--space-3) var(--space-4);\n  border-bottom: 1px solid var(--color-divider);\n}\n.nav-brand {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 18px; margin-right: auto;\n}\n.nav a { color: inherit; text-decoration: none; font-size: 14px; }\n.nav a:hover, .nav a[aria-current='page'] { color: var(--color-accent); }\n\n/* — tables — */\n.table { width: 100%; border-collapse: collapse; font-size: 14px; }\n.table th {\n  text-align: left; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;\n  color: color-mix(in srgb, var(--color-text) 60%, transparent);\n  padding: var(--space-2); border-bottom: 1px solid var(--color-divider);\n}\n.table td {\n  padding: var(--space-2);\n  border-bottom: 1px solid var(--color-divider);\n}\n.table tbody tr:hover { background: color-mix(in srgb, var(--color-text) 4%, transparent); }\n\n/* — dialog — */\n.dialog-backdrop {\n  position: fixed; inset: 0; display: grid; place-items: center;\n  padding: var(--space-4);\n  background: color-mix(in srgb, var(--color-neutral-900) 50%, transparent);\n}\n.dialog {\n  width: min(440px, 100%); display: flex; flex-direction: column; gap: var(--space-3);\n  padding: var(--space-4); border-radius: var(--radius-lg);\n  background: var(--color-surface); box-shadow: var(--shadow-lg); border: 1px solid var(--color-divider);\n}\n.dialog-title {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 20px;\n}\n.dialog-body { font-size: 14px; opacity: 0.85; }\n.dialog-actions { display: flex; justify-content: flex-end; gap: var(--space-2); margin-top: var(--space-2); }\n\n<\u002Fstyle>\n<script src=\"64a82c65-2924-4aff-b433-f16e318d0f38\"><\u002Fscript>\n<style>\n  [data-navitem]{display:flex;align-items:center;gap:12px;width:100%;text-align:left;cursor:pointer;\n    font-family:var(--font-heading);font-weight:600;font-size:14.5px;color:var(--color-text);\n    background:transparent;border:0;border-left:2px solid transparent;\n    p ansform:scaleX(0);transform-origin:left}\n  .fw-reveal[data-in=\"1\"] .anim-x{animation:fwGrowX .9s .15s cubic-bezier(.2,.7,.3,1) forwards}\n  .fw-reveal .anim-y{transform:scaleY(0);transform-origin:bottom}\n  .fw-reveal[data-in=\"1\"] .anim-y{animation:fwGrowY .6s cubic-bezier(.2,.7,.3,1) forwards}\n  .fw-reveal .anim-pop{opacity:0}\n  .fw-reveal[data-in=\"1\"] .anim-pop{animation:fwPop .5s cubic-bezier(.2,.7,.3,1) forwards}\n  .fw-lift{transition:transform .4s cubic-bezier(.2,.7,.3,1),box-shadow .4s ease}\n  .fw-lift:hover{transform:translateY(-4px)}\n  .fw-topnav a{color:color-mix(in srgb,var(--color-text) 62%,transparent);text-decoration:none;font-family:var(--font-heading);font-weight:600;font-size:14px;transition:color .2s}\n  .fw-topnav a:hover{color:var(--color-accent)}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<!-- ══════════ LOGIN ══════════ -->\n<sc-if value=\"{{ isLogin }}\" hint-placeholder-val=\"{{ true }}\">\n<div style=\"background:var(--color-bg);color:var(--color-text)\">\n\n  <!-- STICKY TOP BAR -->\n  <div style=\"position:sticky;top:0;z-index:30;background:var(--color-bg);border-bottom:1px solid var(--color-divider)\">\n    <div style=\"max-width:1120px;margin:0 auto;padding:15px 40px;display:flex;align-items:center;justify-content:space-between\">\n      <div style=\"display:flex;align-items:center;gap:10px\">\n        <div style=\"width:22px;height:22px;border:1.5px solid var(--color-accent);border-radius:50%;display:grid;place-items:center\">\n          <div style=\"width:7px;height:7px;background:var(--color-accent);border-radius:50%\"><\u002Fdiv><\u002Fdiv>\n        <span style=\"font-family:var(--font-heading);font-weight:600;font-size:19px;letter-spacing:.01em\">Fieldwork<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"fw-topnav\" style=\"display:flex;align-items:center;gap:28px\">\n        <a href=\"#how\">How it works<\u002Fa>\n        <a href=\"#features\">Features<\u002Fa>\n        <a href=\"#start\" class=\"btn btn-secondary\" style=\"hei nt:space-between;align-items:flex-start;gap:14px\">\n          <div><div style=\"font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:color-mix(in srgb,var(--color-text) 55%,transparent)\">Northwind Capital · Finance<\u002Fdiv>\n            <div style=\"font-family:var(--font-heading);font-weight:600;font-size:21px;margin-top:2px\">Quantitative Research Intern<\u002Fdiv><\u002Fdiv>\n          <div class=\"anim-pop\" style=\"text-align:right;flex:none;animation-delay:.2s\"><div style=\"font-family:var(--font-heading);font-size:30px;font-weight:600;line-height:1;color:var(--color-accent-700);font-feature-settings:'tnum'\">88<\u002Fdiv>\n            <div style=\"font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:color-mix(in srgb,var(--color-text) 50%,transparent)\">match<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"height:6px;border-radius:3px;background:var(--color-surface);margin:16px 0;overflow:hidden\">\n          <div class=\"anim-x\" style=\"height:100%;width:88%;background:var(--color-accent);border-radius:3px\"><\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:7px\">\n          <span class=\"tag tag-neutral anim-pop\" style=\"animation-delay:.35s\">Python<\u002Fspan>\n          <span class=\"tag tag-neutral anim-pop\" style=\"animation-delay:.45s\">Statistics<\u002Fspan>\n          <span class=\"tag tag-neutral anim-pop\" style=\"animation-delay:.55s\">SQL<\u002Fspan>\n          <span class=\"tag tag-outline anim-pop\" style=\"animation-delay:.65s\">+2 more<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Feature 2 — Tracking -->\n    <div class=\"fw-reveal\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:center;padding:70px 0;border-bottom:1px solid var(--color-divider)\">\n      <div class=\"fw-lift\" style=\"border:1px solid var(--color-divider);border-radius:var(--radius-lg);padding:8px;background:var(--color-bg);box-shadow:var(--shadow-sm);order:0\">\n        <sc-raw-table class=\"table\" style=\"margin:0\"><sc-raw-thead><sc-raw-tr><sc-raw-th style=\"padding-left:14px\">Company<\u002Fsc-raw-th><sc-raw-th>Status<\u002Fsc-raw-th><sc-raw-th style=\"text-align:right;padding-right:14px\">Applied<\u002Fsc-raw-th><\u002Fsc-raw-tr><\u002Fsc-raw-thead>\n          <sc-raw-tbody>\n            <sc-raw-tr class=\"anim-pop\" style=\"animation-delay:.15s\"><sc-raw-td style=\"padding-left:14px;font-family:var(--font-heading);font-weight:600\">Meridian Design<\u002Fsc-raw-td><sc-raw-td><span class=\"tag tag-accent-2\">Offer<\u002Fspan><\u002Fsc-raw-td><sc-raw-td style=\"text-align:right;padding-right:14px;font-size:13px\">Jun 10<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n            <sc-raw-tr class=\"anim-pop\" style=\"animation-delay:.28s\"><sc-raw-td style=\"padding-left:14px;font-family:var(--font-heading);font-weight:600\">Northwind Capital<\u002Fsc-raw-td><sc-raw-td><span class=\"tag tag-accent\">Interviewing<\u002Fspan><\u002Fsc-raw-td><sc-raw-td style=\"text-align:right;padding-right:14px;font-size:13px\">Jun 28<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n            <sc-raw-tr class=\"anim-pop\" style=\"animation-delay:.41s\"><sc-raw-td style=\"padding-left:14px;font-family:var(--font-heading);font-weight:600\">Helios Bio<\u002Fsc-raw-td><sc-raw-td><span class=\"tag tag-neutral\">Applied<\u002Fspan><\u002Fsc-raw-td><sc-raw-td style=\"text-align:right;padding-right:14px;font-size:13px\">Jul 05<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n            <sc-raw-tr class=\"anim-pop\" style=\"animation-delay:.54s\"><sc-raw-td style=\"padding-left:14px;font-family:var(--font-heading);font-weight:600\">Vireo Media<\u002Fsc-raw-td><sc-raw-td><span class=\"tag tag-outline\">Rejected<\u002Fspan><\u002Fsc-raw-td><sc-raw-td style=\"text-align:right;padding-right:14px;font-size:13px\">May 30<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n          <\u002Fsc-raw-tbody><\u002Fsc-raw-table>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--color-accent-700);margin-bottom:14px\">02 · Tracking<\u002Fdiv>\n        <h2 style=\"font-size:38px;font-weight:400;letter-spacing:-.02em;margin:0 0 16px;line-height:1.1\">One ledger, applied to&nbsp;offer.<\u002Fh2>\n        <p style=\"font-size:16px;line-height:1.7;color:color-mix(in srgb,var(--color-text) 62%,transparent);margin:0 0 20px;max-width:44ch\">Log every application in a single table, expand any row for notes and interview dates, and watch the season move from applied to interviewing to offer without a spreadsheet in sight.<\u002Fp>\n        <div style=\"display:flex;flex-direction:column;gap:10px\">\n          <div style=\"display:flex;align-items:center;gap:10px;font-size:14px\"><svg sc-camel-view-box=\"0 0 24 24\" width=\"16\" height=\"16\" fill=\"none\" stroke=\"var(--color-accent)\" stroke-width=\"2\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg>Sort and filter by status, company, or date<\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:10px;font-size:14px\"><svg sc-camel-view-box=\"0 0 24 24\" width=\"16\" height=\"16\" fill=\"none\" stroke=\"var(--color-accent)\" stroke-width=\"2\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg>Notes and interviews kept beside each role<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Feature 3 — Preparation -->\n    <div class=\"fw-reveal\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:center;padding:70px 0\">\n      <div>\n        <div style=\"font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--color-accent-700);margin-bottom:14px\">03 · Preparation<\u002Fdiv>\n        <h2 style=\"font-size:38px;font-weight:400;letter-spacing:-.02em;margin:0 0 16px;line-height:1.1\">Prep, timed to your&nbsp;interviews.<\u002Fh2>\n        <p style=\"font-size:16px;line-height:1.7;color:color-mix(in srgb,var(--color-text) 62%,transparent);margin:0 0 20px;max-width:44ch\">A calendar builds itself backward from each interview date and forward from the hours you have, so the week before a big onsite fills with exactly the right practice — and you can check it off as you go.<\u002Fp>\n        <div style=\"display:flex;flex-direction:column;gap:10px\">\n          <div style=\"display:flex;align-items:center;gap:10px;font-size:14px\"><svg sc-camel-view-box=\"0 0 24 24\" width=\"16\" height=\"16\" fill=\"none\" stroke=\"var(--color-accent)\" stroke-width=\"2\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg>Month, week, and list views<\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:10px;font-size:14px\"><svg sc-camel-view-box=\"0 0 24 24\" width=\"16\" height=\"16\" fill=\"none\" stroke=\"var(--color-accent)\" stroke-width=\"2\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg>Add your own tasks and snooze what slips<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"fw-lift\" style=\"border:1px solid var(--color-divider);border-radius:var(--radius-lg);padding:22px 24px;background:var(--color-bg);box-shadow:var(--shadow-sm)\">\n        <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:16px\">\n          <span style=\"font-family:var(--font-heading);font-weight:600;font-size:15px\">This week<\u002Fspan>\n          <span style=\"font-size:13px;color:var(--color-accent-700);font-feature-settings:'tnum'\">12h prep scheduled<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;align-items:flex-end;justify-content:space-between;gap:9px;height:90px\">\n          <sc-for list=\"{{ prepBarsLight }}\" as=\"bar\" hint-placeholder-count=\"7\">\n            <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;height:100%;justify-content:flex-end\">\n              <div class=\"anim-y\" style=\"width:100%;height:{{ bar.h }};border-radius:3px 3px 0 0;background:{{ bar.color }};animation-delay:{{ bar.delay }}\"><\u002Fdiv>\n              <span style=\"font-size:10px;color:{{ bar.labelColor }};font-family:var(--font-heading);font-weight:600\">{{ bar.label }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div class=\"anim-pop\" style=\"display:flex;align-items:center;gap:8px;margin-top:16px;padding:9px 12px;border-left:2px solid var(--color-accent);background:var(--color-accent-100);border-radius:2px;animation-delay:.6s\">\n          <span style=\"font-size:13px\">Thu — Northwind onsite prep<\u002Fspan>\n          <span style=\"font-size:11px;color:color-mix(in srgb,var(--color-text) 55%,transparent);margin-left:auto;font-feature-settings:'tnum'\">3h<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- HOW IT WORKS -->\n  <div id=\"how\" style=\"background:var(--color-surface);border-top:1px solid var(--color-divider);border-bottom:1px solid var(--color-divider);scroll-margin-top:80px\">\n    <div style=\"max-width:1120px;margin:0 auto;padding:64px 40px\">\n      <div class=\"fw-reveal\" style=\"text-align:center;margin-bottom:48px\">\n        <div style=\"font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--color-accent-700);margin-bottom:12px\">The method<\u002Fdiv>\n        <h2 style=\"font-size:40px;font-weight:400;letter-spacing:-.02em;margin:0\">Three steps, start to offer.<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"fw-reveal\" style=\"display:grid;grid-template-columns:repeat(3,1fr)\">\n        <div style=\"padding:0 34px\">\n          <div style=\"font-family:var(--font-heading);font-size:56px;font-weight:400;line-height:1;color:var(--color-accent);opacity:.35;font-feature-settings:'tnum';margin-bottom:16px\">01<\u002Fdiv>\n          <h3 style=\"font-size:22px;font-weight:600;margin:0 0 10px\">Upload your résumé<\u002Fh3>\n          <p style=\"font-size:15px;line-height:1.7;color:color-mix(in srgb,var(--color-text) 62%,transparent);margin:0\">We read your skills and interests and turn them into a match profile that scores every role you see.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"padding:0 34px;border-left:1px solid var(--color-divider)\">\n          <div style=\"font-family:var(--font-heading);font-size:56px;font-weight:400;line-height:1;color:var(--color-accent);opacity:.35;font-feature-settings:'tnum';margin-bottom:16px\">02<\u002Fdiv>\n          <h3 style=\"font-size:22px;font-weight:600;margin:0 0 10px\">Apply and log<\u002Fh3>\n          <p style=\"font-size:15px;line-height:1.7;color:color-mix(in srgb,var(--color-text) 62%,transparent);margin:0\">Send applications and record them in one place — one click straight from a recommendation into your ledger.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"padding:0 34px;border-left:1px solid var(--color-divider)\">\n          <div style=\"font-family:var(--font-heading);font-size:56px;font-weight:400;line-height:1;color:var(--color-accent);opacity:.35;font-feature-settings:'tnum';margin-bottom:16px\">03<\u002Fdiv>\n          <h3 style=\"font-size:22px;font-weight:600;margin:0 0 10px\">Prepare and land it<\u002Fh3>\n          <p style=\"font-size:15px;line-height:1.7;color:color-mix(in srgb,var(--color-text) 62%,transparent);margin:0\">A prep calendar times your practice to each interview, so you walk in ready and walk out with an offer.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- COLOPHON QUOTE -->\n  <div style=\"background:#1a1815;color:#eae4da;position:relative;overflow:hidden\">\n    <div class=\"fw-reveal\" style=\"max-width:900px;margin:0 auto;padding:80px 40px;text-align:center;position:relative\">\n      <div style=\"font-family:var(--font-heading);font-size:120px;line-height:.6;color:var(--color-accent);opacity:.22;margin-bottom:8px\">“<\u002Fdiv>\n      <p style=\"font-family:var(--font-heading);font-size:32px;font-weight:400;line-height:1.35;color:#f4efe6;letter-spacing:-.01em;margin:0 0 24px;font-style:italic;text-wrap:pretty\">I stopped losing track of deadlines the week I started using it. The whole season finally felt like something I could hold in one hand.<\u002Fp>\n      <div style=\"width:36px;height:1px;background:var(--color-accent);margin:0 auto 16px\"><\u002Fdiv>\n      <div style=\"font-size:13px;letter-spacing:.06em;text-transform:uppercase;color:#b2aa9d\">A junior, computer science · class of 2027<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- START (AUTH) -->\n  <div id=\"start\" style=\"scroll-margin-top:80px;border-bottom:1px solid var(--color-divider)\">\n    <div class=\"fw-reveal\" style=\"max-width:1120px;margin:0 auto;padding:80px 40px;display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:center\">\n      <div>\n        <div style=\"width:44px;height:1px;background:var(--color-accent);margin-bottom:22px\"><\u002Fdiv>\n        <h2 style=\"font-size:46px;font-weight:400;letter-spacing:-.02em;line-height:1.06;margin:0 0 18px\">Start your season.<\u002Fh2>\n        <p style=\"font-size:17px;line-height:1.65;color:color-mix(in srgb,var(--color-text) 62%,transparent);max-width:40ch;margin:0\">Discovery, tracking, and prep in one quiet, well-kept place. Free while you're in school.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"border:1px solid var(--color-divider);border-radius:var(--radius-lg);padding:36px;background:var(--color-bg);box-shadow:var(--shadow-md)\">\n        <form sc-camel-on-submit=\"{{ onLogin }}\">\n          <div style=\"font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--color-accent-700);margin-bottom:8px\">{{ authKicker }}<\u002Fdiv>\n          <h3 style=\"font-size:28px;font-weight:600;margin:0 0 22px\">{{ authTitle }}<\u002Fh3>\n          <div class=\"field\" style=\"margin-bottom:16px\"><label>Email<\u002Flabel>\n            <input class=\"input\" type=\"email\" value=\"you@university.edu\" autocomplete=\"email\"><\u002Fdiv>\n          <div class=\"field\" style=\"margin-bottom:16px\"><label>Password<\u002Flabel>\n            <input class=\"input\" type=\"password\" value=\"••••••••\"><\u002Fdiv>\n          <sc-if value=\"{{ isSignup }}\" hint-placeholder-val=\"{{ false }}\">\n            <div class=\"field\" style=\"margin-bottom:16px\"><label>Confirm password<\u002Flabel>\n              <input class=\"input\" type=\"password\" value=\"••••••••\"><\u002Fdiv>\n          <\u002Fsc-if>\n          <button class=\"btn btn-primary btn-block\" type=\"submit\" style=\"height:44px;margin-top:8px\">{{ authCta }}<\u002Fbutton>\n          <div class=\"hr\" style=\"margin:20px 0\"><\u002Fdiv>\n          <p class=\"text-muted\" style=\"font-size:13px;text-align:center;margin:0\">\n            {{ authSwitchText }} <a href=\"#\" sc-camel-on-click=\"{{ onToggleAuth }}\" style=\"font-family:var(--font-heading);font-weight:600\">{{ authSwitchLink }}<\u002Fa>\n          <\u002Fp>\n        <\u002Fform>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- FOOTER -->\n  <div style=\"max-width:1120px;margin:0 auto;padding:28px 40px;display:flex;align-items:center;justify-content:space-between\">\n    <div style=\"display:flex;align-items:center;gap:9px\">\n      <div style=\"width:18px;height:18px;border:1.5px solid var(--color-accent);border-radius:50%;display:grid;place-items:center\"><div style=\"width:6px;height:6px;background:var(--color-accent);border-radius:50%\"><\u002Fdiv><\u002Fdiv>\n      <span style=\"font-family:var(--font-heading);font-weight:600;font-size:16px\">Fieldwork<\u002Fspan>\n    <\u002Fdiv>\n    <span style=\"font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:color-mix(in srgb,var(--color-text) 50%,transparent)\">Sourcing · Tracking · Preparation<\u002Fspan>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ══════════ APP SHELL ══════════ -->\n<sc-if value=\"{{ isAuthed }}\" hint-placeholder-val=\"{{ false }}\">\n<div style=\"display:flex;min-height:100vh\">\n  <!-- Sidebar -->\n  <aside style=\"width:250px;flex:none;border-right:1px solid var(--color-divider);background:var(--color-bg);position:sticky;top:0;height:100vh;display:flex;flex-direction:column;padding:26px 0\">\n    <div style=\"padding:0 24px 22px;display:flex;align-items:center;gap:10px\">\n      <div style=\"width:26px;height:26px;border:1.5px solid var(--color-accent);border-radius:50%;display:grid;place-items:center\">\n        <div style=\"width:8px;height:8px;background:var(--color-accent);border-radius:50%\"><\u002Fdiv>\n      <\u002Fdiv>\n      <span style=\"font-family:var(--font-heading);font-weight:600;font-size:20px;letter-spacing:.01em\">Fieldwork<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"hr\" style=\"margin:0 0 14px\"><\u002Fdiv>\n    <nav style=\"display:flex;flex-direction:column;gap:2px;padding-right:12px\">\n      <button data-navitem=\"\" data-active=\"{{ navDash }}\" sc-camel-on-click=\"{{ goDash }}\">\n        <svg sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"3\" width=\"7\" height=\"9\"><\u002Frect><rect x=\"14\" y=\"3\" width=\"7\" height=\"5\"><\u002Frect><rect x=\"14\" y=\"12\" width=\"7\" height=\"9\"><\u002Frect><rect x=\"3\" y=\"16\" width=\"7\" height=\"5\"><\u002Frect><\u002Fsvg>Dashboard<\u002Fbutton>\n      <button data-navitem=\"\" data-active=\"{{ navFind }}\" sc-camel-on-click=\"{{ goFind }}\">\n        <svg sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><polygon points=\"16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76\"><\u002Fpolygon><\u002Fsvg>Find Internships<\u002Fbutton>\n      <button data-navitem=\"\" data-active=\"{{ navApps }}\" sc-camel-on-click=\"{{ goApps }}\">\n        <svg sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"2\" y=\"7\" width=\"20\" height=\"14\" rx=\"2\"><\u002Frect><path d=\"M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16\"><\u002Fpath><\u002Fsvg>My Applications<\u002Fbutton>\n      <button data-navitem=\"\" data-active=\"{{ navCal }}\" sc-camel-on-click=\"{{ goCal }}\">\n        <svg sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"4\" width=\"18\" height=\"18\" rx=\"2\"><\u002Frect><line x1=\"16\" y1=\"2\" x2=\"16\" y2=\"6\"><\u002Fline><line x1=\"8\" y1=\"2\" x2=\"8\" y2=\"6\"><\u002Fline><line x1=\"3\" y1=\"10\" x2=\"21\" y2=\"10\"><\u002Fline><\u002Fsvg>Prep Calendar<\u002Fbutton>\n      <button data-navitem=\"\" data-active=\"{{ navResume }}\" sc-camel-on-click=\"{{ goResume }}\">\n        <svg sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z\"><\u002Fpath><polyline points=\"14 2 14 8 20 8\"><\u002Fpolyline><line x1=\"16\" y1=\"13\" x2=\"8\" y2=\"13\"><\u002Fline><line x1=\"16\" y1=\"17\" x2=\"8\" y2=\"17\"><\u002Fline><line x1=\"10\" y1=\"9\" x2=\"8\" y2=\"9\"><\u002Fline><\u002Fsvg>Résumé<\u002Fbutton>\n    <\u002Fnav>\n    <div style=\"margin-top:auto;padding:0 12px\">\n      <div class=\"hr\" style=\"margin:0 0 12px\"><\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:11px;padding:0 12px 12px\">\n        <div style=\"width:34px;height:34px;border-radius:50%;background:var(--color-surface);border:1px solid var(--color-divider);display:grid;place-items:center;font-family:var(--font-heading);font-weight:600;font-size:14px;color:var(--color-accent)\">SC<\u002Fdiv>\n        <div style=\"line-height:1.25\"><div style=\"font-size:13px;font-weight:600;font-family:var(--font-heading)\">Spandan C.<\u002Fdiv><di
