sc-if>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- APPLICATIONS -->\n    <sc-if value=\"{{ isApps }}\" hint-placeholder-val=\"{{ false }}\">\n    <div class=\"fw-fade\" style=\"max-width:1060px;margin:0 auto\">\n      <div style=\"display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:24px;gap:20px\">\n        <div><h1 style=\"font-size:40px;font-weight:400;letter-spacing:-.02em;margin:0 0 4px\">My Applications<\u002Fh1>\n          <p class=\"text-muted\" style=\"font-size:15px;margin:0\">{{ appCountLabel }}<\u002Fp><\u002Fdiv>\n        <button class=\"btn btn-primary\" sc-camel-on-click=\"{{ openAddApp }}\" style=\"height:40px\">\n          <svg sc-camel-view-box=\"0 0 24 24\" width=\"15\" height=\"15\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\"><line x1=\"12\" y1=\"5\" x2=\"12\" y2=\"19\"><\u002Fline><line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"><\u002Fline><\u002Fsvg>Log application<\u002Fbutton>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;gap:14px;margin-bottom:14px\">\n        <div class=\"field\" style=\"margin:0\"><label>Status<\u002Flabel>\n          <sc-raw-select class=\"input\" value=\"{{ appFilter }}\" sc-camel-on-change=\"{{ onAppFilter }}\" style=\"min-width:150px\">\n            <option value=\"all\">All statuses<\u002Foption><option value=\"applied\">Applied<\u002Foption>\n            <option value=\"interviewing\">Interviewing<\u002Foption><option value=\"offer\">Offer<\u002Foption>\n            <option value=\"rejected\">Rejected<\u002Foption><option value=\"accepted\">Accepted<\u002Foption>\n          <\u002Fsc-raw-select><\u002Fdiv>\n        <div class=\"field\" style=\"margin:0\"><label>Sort by<\u002Flabel>\n          <sc-raw-select class=\"input\" value=\"{{ appSort }}\" sc-camel-on-change=\"{{ onAppSort }}\" style=\"min-width:150px\">\n            <option value=\"date\">Date applied<\u002Foption><option value=\"company\">Company<\u002Foption><option value=\"status\">Status<\u002Foption>\n          <\u002Fsc-raw-select><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"border:1px solid var(--color-divider);border-radius:var(--radius-md);overflow:hidden\">\n        <sc-raw-table class=\"table\">\n          <sc-raw-thead><sc-raw-tr><sc-raw-th style=\"padding-left:20px\">Company<\u002Fsc-raw-th><sc-raw-th>Role<\u002Fsc-raw-th><sc-raw-th>Status<\u002Fsc-raw-th><sc-raw-th>Applied<\u002Fsc-raw-th><sc-raw-th style=\"text-align:right;padding-right:20px\">Actions<\u002Fsc-raw-th><\u002Fsc-raw-tr><\u002Fsc-raw-thead>\n          <sc-raw-tbody>\n            <sc-for list=\"{{ apps }}\" as=\"app\" hint-placeholder-count=\"4\">\n              <sc-raw-tr>\n                <sc-raw-td style=\"padding-left:20px\">\n                  <button sc-camel-on-click=\"{{ app.onToggle }}\" style=\"background:none;border:0;cursor:pointer;display:inline-flex;align-items:center;gap:8px;font-family:var(--font-heading);font-weight:600;font-size:14.5px;color:var(--color-text)\">\n                    <svg sc-camel-view-box=\"0 0 24 24\" width=\"14\" height=\"14\" fill=\"none\" stroke=\"var(--color-accent)\" stroke-width=\"2\" style=\"transform:{{ app.caretRotate }};transition:transform .15s\"><polyline points=\"9 18 15 12 9 6\"><\u002Fpolyline><\u002Fsvg>{{ app.company }}<\u002Fbutton>\n                <\u002Fsc-raw-td>\n                <sc-raw-td style=\"font-size:13.5px\">{{ app.role }}<\u002Fsc-raw-td>\n                <sc-raw-td><span class=\"{{ app.statusClass }}\">{{ app.statusLabel }}<\u002Fspan><\u002Fsc-raw-td>\n                <sc-raw-td style=\"font-size:13px\"><div>{{ app.appliedText }}<\u002Fdiv><div class=\"text-muted\" style=\"font-size:11px\">{{ app.relText }}<\u002Fdiv><\u002Fsc-raw-td>\n                <sc-raw-td style=\"text-align:right;padding-right:20px\">\n                  <button class=\"btn btn-ghost\" sc-camel-on-click=\"{{ app.onEdit }}\" style=\"font-size:12px\">Edit<\u002Fbutton>\n                  <button class=\"btn btn-ghost\" sc-camel-on-click=\"{{ app.onDelete }}\" style=\"font-size:12px;color:var(--color-neutral-600)\">Delete<\u002Fbutton>\n                <\u002Fsc-raw-td>\n              <\u002Fsc-raw-tr>\n              <sc-if value=\"{{ app.expanded }}\" hint-placeholder-val=\"{{ false }}\">\n                <sc-raw-tr><sc-raw-td colspan=\"5\" style=\"background:var(--color-surface);padding:18px 20px\">\n                  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:22px\">\n                    <div><h4 style=\"font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:color-mix(in srgb,var(--color-text) 60%,transparent);margin:0 0 6px\">Notes<\u002Fh4>\n                      <p style=\"font-size:13px;margin:0;line-height:1.6\">{{ app.notes }}<\u002Fp><\u002Fdiv>\n                    <div><h4 style=\"font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:color-mix(in srgb,var(--color-text) 60%,transparent);margin:0 0 6px\">Interviews<\u002Fh4>\n                      <p style=\"font-size:13px;margin:0;line-height:1.6\">{{ app.interviewText }}<\u002Fp>\n                      <div class=\"text-muted\" style=\"font-size:11px;margin-top:10px\">Updated {{ app.updatedText }}<\u002Fdiv><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-raw-td><\u002Fsc-raw-tr>\n              <\u002Fsc-if>\n            <\u002Fsc-for>\n          <\u002Fsc-raw-tbody>\n        <\u002Fsc-raw-table>\n        <sc-if value=\"{{ noApps }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"text-align:center;padding:50px 20px\"><p class=\"text-muted\" style=\"margin:0\">No applications in this view. Log one to get started.<\u002Fp><\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- CALENDAR -->\n    <sc-if value=\"{{ isCal }}\" hint-placeholder-val=\"{{ false }}\">\n    <div class=\"fw-fade\" style=\"max-width:1060px;margin:0 auto\">\n      <div style=\"display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:22px;gap:20px\">\n        <div><h1 style=\"font-size:40px;font-weight:400;letter-spacing:-.02em;margin:0 0 4px\">Prep Calendar<\u002Fh1>\n          <p class=\"text-muted\" style=\"font-size:15px;margin:0\">A schedule built from your interview dates and available hours.<\u002Fp><\u002Fdiv>\n        <button class=\"btn btn-primary\" sc-camel-on-click=\"{{ openAddTask }}\" style=\"height:40px\">\n          <svg sc-camel-view-box=\"0 0 24 24\" width=\"15\" height=\"15\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\"><line x1=\"12\" y1=\"5\" x2=\"12\" y2=\"19\"><\u002Fline><line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"><\u002Fline><\u002Fsvg>Add task<\u002Fbutton>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;gap:16px;flex-wrap:wrap\">\n        <div style=\"display:flex;align-items:center;gap:14px\">\n          <button class=\"btn btn-icon btn-secondary\" sc-camel-on-click=\"{{ calPrev }}\"><svg sc-camel-view-box=\"0 0 24 24\" width=\"16\" height=\"16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><polyline points=\"15 18 9 12 15 6\"><\u002Fpolyline><\u002Fsvg><\u002Fbutton>\n          <h2 style=\"font-size:26px;font-weight:600;margin:0;min-width:200px;text-align:center\">{{ calLabel }}<\u002Fh2>\n          <button class=\"btn btn-icon btn-secondary\" sc-camel-on-click=\"{{ calNext }}\"><svg sc-camel-view-box=\"0 0 24 24\" width=\"16\" height=\"16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><polyline points=\"9 18 15 12 9 6\"><\u002Fpolyline><\u002Fsvg><\u002Fbutton>\n        <\u002Fdiv>\n        <div class=\"seg\">\n          <label class=\"seg-opt\"><input type=\"radio\" name=\"calview\" checked=\"{{ calMonthly }}\" sc-camel-on-change=\"{{ setCalMonthly }}\">Month<\u002Flabel>\n          <label class=\"seg-opt\"><input type=\"radio\" name=\"calview\" checked=\"{{ calWeekly }}\" sc-camel-on-change=\"{{ setCalWeekly }}\">Week<\u002Flabel>\n          <label class=\"seg-opt\"><input type=\"radio\" name=\"calview\" checked=\"{{ calList }}\" sc-camel-on-change=\"{{ setCalListView }}\">List<\u002Flabel>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;gap:18px;font-size:12px;color:color-mix(in srgb,var(--color-text) 60%,transparent);margin-bottom:14px\">\n        <span style=\"display:inline-flex;align-items:center;gap:6px\"><span style=\"width:10px;height:10px;border-radius:2px;background:var(--color-accent)\"><\u002Fspan>Interview prep<\u002Fspan>\n        <span style=\"display:inline-flex;align-items:center;gap:6px\"><span style=\"width:10px;height:10px;border-radius:2px;background:var(--color-neutral-500)\"><\u002Fspan>General prep<\u002Fspan>\n        <span style=\"display:inline-flex;align-items:center;gap:6px\"><span style=\"width:10px;height:10px;border-radius:2px;border:1.5px solid var(--color-accent)\"><\u002Fspan>Custom<\u002Fspan>\n      <\u002Fdiv>\n\n      <!-- MONTH -->\n      <sc-if value=\"{{ calMonthly }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"border:1px solid var(--color-divider);border-radius:var(--radius-md);overflow:hidden\">\n          <div style=\"display:grid;grid-template-columns:repeat(7,1fr);background:var(--color-surface)\">\n            <sc-for list=\"{{ weekdayNames }}\" as=\"wd\" hint-placeholder-count=\"7\">\n              <div style=\"padding:9px;text-align:center;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:color-mix(in srgb,var(--color-text) 55%,transparent);border-bottom:1px solid var(--color-divider)\">{{ wd }}<\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <sc-for list=\"{{ calWeeks }}\" as=\"week\" hint-placeholder-count=\"5\">\n            <div style=\"display:grid;grid-template-columns:repeat(7,1fr)\">\n              <sc-for list=\"{{ week }}\" as=\"cell\" hint-placeholder-count=\"7\">\n                <div style=\"min-height:104px;padding:6px 7px;border-right:1px solid var(--color-divider);border-bottom:1px solid var(--color-divider);background:{{ cell.bg }}\">\n                  <div style=\"font-family:var(--font-heading);font-size:13px;font-weight:600;font-feature-settings:'tnum';color:{{ cell.dayColor }};margin-bottom:4px\">{{ cell.day }}<\u002Fdiv>\n                  <div style=\"display:flex;flex-direction:column;gap:3px\">\n                    <sc-for list=\"{{ cell.events }}\" as=\"ev\" hint-placeholder-count=\"2\">\n                      <button sc-camel-on-click=\"{{ ev.onOpen }}\" title=\"{{ ev.title }}\" style=\"text-align:left;cursor:pointer;font-size:10.5px;line-height:1.25;padding:3px 6px;border:0;border-left:2px solid {{ ev.accent }};border-radius:2px;background:{{ ev.chipBg }};color:var(--color-text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;{{ ev.strike }}\">{{ ev.title }}<\u002Fbutton>\n                    <\u002Fsc-for>\n                    <sc-if value=\"{{ cell.hasMore }}\" hint-placeholder-val=\"{{ false }}\"><div class=\"text-muted\" style=\"font-size:10px;padding-left:6px\">{{ cell.moreLabel }}<\u002Fdiv><\u002Fsc-if>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- WEEK -->\n      <sc-if value=\"{{ calWeekly }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"padding:16px 18px;border:1px solid var(--color-divider);border-radius:var(--radius-md);margin-bottom:16px\">\n          <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:9px\">\n            <span style=\"font-family:var(--font-heading);font-weight:600;font-size:14px\">Prep intensity · {{ weekTotalLabel }}<\u002Fspan>\n            <span style=\"font-size:12.5px;color:var(--color-accent-700);font-weight:600\">{{ intensityLabel }}<\u002Fspan><\u002Fdiv>\n          <div style=\"height:8px;border-radius:4px;background:var(--color-surface);overflow:hidden\">\n            <div style=\"height:100%;width:{{ intensityPct }};background:var(--color-accent);border-radius:4px\"><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(7,1fr);gap:10px\">\n          <sc-for list=\"{{ weekCells }}\" as=\"cell\" hint-placeholder-count=\"7\">\n            <div style=\"border:1px solid var(--color-divider);border-radius:var(--radius-md);padding:10px 9px;min-height:170px;background:{{ cell.bg }}\">\n              <div style=\"text-align:center;margin-bottom:8px\">\n                <div style=\"font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:color-mix(in srgb,var(--color-text) 55%,transparent)\">{{ cell.wd }}<\u002Fdiv>\n                <div style=\"font-family:var(--font-heading);font-weight:600;font-size:17px;font-feature-settings:'tnum';color:{{ cell.dayColor }}\">{{ cell.day }}<\u002Fdiv><\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:4px\">\n                <sc-for list=\"{{ cell.events }}\" as=\"ev\" hint-placeholder-count=\"2\">\n                  <button sc-camel-on-click=\"{{ ev.onOpen }}\" style=\"text-align:left;cursor:pointer;font-size:10.5px;line-height:1.3;padding:4px 6px;border:0;border-left:2px solid {{ ev.accent }};border-radius:2px;background:{{ ev.chipBg }};color:var(--color-text);{{ ev.strike }}\">{{ ev.title }}<\u002Fbutton>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <div style=\"text-align:center;font-size:11px;font-weight:600;color:color-mix(in srgb,var(--color-text) 60%,transparent);margin-top:8px;padding-top:6px;border-top:1px solid var(--color-divider)\">{{ cell.hours }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- LIST -->\n      <sc-if value=\"{{ calList }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"border:1px solid var(--color-divider);border-radius:var(--radius-md);overflow:hidden\">\n          <sc-raw-table class=\"table\"><sc-raw-thead><sc-raw-tr><sc-raw-th style=\"width:44px;padding-left:20px\"><\u002Fsc-raw-th><sc-raw-th>Task<\u002Fsc-raw-th><sc-raw-th>Due<\u002Fsc-raw-th><sc-raw-th>Type<\u002Fsc-raw-th><sc-raw-th>Hours<\u002Fsc-raw-th><\u002Fsc-raw-tr><\u002Fsc-raw-thead>\n            <sc-raw-tbody>\n              <sc-for list=\"{{ listEvents }}\" as=\"ev\" hint-placeholder-count=\"6\">\n                <sc-raw-tr>\n                  <sc-raw-td style=\"padding-left:20px\"><input type=\"checkbox\" checked=\"{{ ev.completed }}\" sc-camel-on-change=\"{{ ev.onToggle }}\" style=\"width:16px;height:16px;accent-color:var(--color-accent);cursor:pointer\"><\u002Fsc-raw-td>\n                  <sc-raw-td><button sc-camel-on-click=\"{{ ev.onOpen }}\" style=\"background:none;border:0;cursor:pointer;font-family:var(--font-body);font-size:14px;color:var(--color-text);text-align:left;{{ ev.strike }}\">{{ ev.title }}<\u002Fbutton><\u002Fsc-raw-td>\n                  <sc-raw-td style=\"font-size:13px\">{{ ev.dueText }}<\u002Fsc-raw-td>\n                  <sc-raw-td><span class=\"{{ ev.typeClass }}\">{{ ev.typeLabel }}<\u002Fspan><\u002Fsc-raw-td>\n                  <sc-raw-td style=\"font-size:13px;font-feature-settings:'tnum'\">{{ ev.hours }}<\u002Fsc-raw-td>\n                <\u002Fsc-raw-tr>\n              <\u002Fsc-for>\n            <\u002Fsc-raw-tbody>\n          <\u002Fsc-raw-table>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- RESUME -->\n    <sc-if value=\"{{ isResume }}\" hint-placeholder-val=\"{{ false }}\">\n    <div class=\"fw-fade\" style=\"max-width:1060px;margin:0 auto\">\n      <h1 style=\"font-size:40px;font-weight:400;letter-spacing:-.02em;margin:0 0 4px\">Résumé<\u002Fh1>\n      <p class=\"text-muted\" style=\"font-size:15px;margin:0 0 28px\">Your active résumé drives every recommendation. Upload a new version any time.<\u002Fp>\n\n      <div style=\"display:grid;grid-template-columns:1.5fr 1fr;gap:32px\">\n        <div>\n          <div style=\"border:1px solid var(--color-divider);border-radius:var(--radius-md);padding:24px;margin-bottom:24px\">\n            <div style=\"display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px\">\n              <div style=\"display:flex;gap:14px;align-items:center\">\n                <div style=\"width:44px;height:54px;border:1px solid var(--color-divider);border-radius:3px;display:grid;place-items:center;background:var(--color-surface)\">\n                  <svg sc-camel-view-box=\"0 0 24 24\" width=\"20\" height=\"20\" fill=\"none\" stroke=\"var(--color-accent)\" stroke-width=\"1.5\"><path d=\"M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z\"><\u002Fpath><polyline points=\"14 2 14 8 20 8\"><\u002Fpolyline><\u002Fsvg><\u002Fdiv>\n                <div><div style=\"font-family:var(--font-heading);font-weight:600;font-size:17px\">{{ activeResume.name }}<\u002Fdiv>\n                  <div class=\"text-muted\" style=\"font-size:12.5px\">Active · uploaded {{ activeResume.uploadedText }}<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n              <span class=\"tag tag-accent\">Active<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"hr\" style=\"margin:0 0 18px\"><\u002Fdiv>\n            <h4 style=\"font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:color-mix(in srgb,var(--color-text) 60%,transparent);margin:0 0 10px\">Extracted skills<\u002Fh4>\n            <div style=\"display:flex;flex-wrap:wrap;gap:7px;margin-bottom:20px\">\n              <sc-for list=\"{{ activeResume.skills }}\" as=\"sk\" hint-placeholder-count=\"7\"><span class=\"tag tag-neutral\">{{ sk }}<\u002Fspan><\u002Fsc-for><\u002Fdiv>\n            <h4 style=\"font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:color-mix(in srgb,var(--color-text) 60%,transparent);margin:0 0 10px\">Interests<\u002Fh4>\n            <div style=\"display:flex;flex-wrap:wrap;gap:7px\">\n              <sc-for list=\"{{ activeResume.interests }}\" as=\"it\" hint-placeholder-count=\"4\"><span class=\"tag tag-outline\">{{ it }}<\u002Fspan><\u002Fsc-for><\u002Fdiv>\n          <\u002Fdiv>\n\n          <label style=\"display:block;border:1px dashed var(--color-divider);border-radius:var(--radius-md);padding:34px;text-align:center;cursor:pointer\" sc-camel-on-click=\"{{ onUpload }}\">\n            <svg sc-camel-view-box=\"0 0 24 24\" width=\"26\" height=\"26\" fill=\"none\" stroke=\"var(--color-accent)\" stroke-width=\"1.5\" style=\"margin-bottom:10px\"><path d=\"M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4\"><\u002Fpath><polyline points=\"17 8 12 3 7 8\"><\u002Fpolyline><line x1=\"12\" y1=\"3\" x2=\"12\" y2=\"15\"><\u002Fline><\u002Fsvg>\n            <div style=\"font-family:var(--font-heading);font-weight:600;font-size:15px;margin-bottom:3px\">Upload a new version<\u002Fdiv>\n            <div class=\"text-muted\" style=\"font-size:12.5px\">PDF or DOCX, up to 10 MB. We'll re-run your recommendations.<\u002Fdiv>\n          <\u002Flabel>\n        <\u002Fdiv>\n\n        <div>\n          <h3 style=\"font-size:15px;text-transform:uppercase;letter-spacing:.08em;font-weight:600;color:color-mix(in srgb,var(--color-text) 60%,transparent);margin:0 0 16px\">Version history<\u002Fh3>\n          <div style=\"display:flex;flex-direction:column;gap:10px\">\n            <sc-for list=\"{{ resumeVersions }}\" as=\"rv\" hint-placeholder-count=\"3\">\n              <div style=\"border:1px solid {{ rv.borderColor }};border-radius:var(--radius-md);padding:14px 16px;display:flex;justify-content:space-between;align-items:center;gap:12px\">\n                <div style=\"min-width:0\"><div style=\"font-family:var(--font-heading);font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ rv.name }}<\u002Fdiv>\n                  <div class=\"text-muted\" style=\"font-size:11.5px\">{{ rv.uploadedText }}<\u002Fdiv><\u002Fdiv>\n                <sc-if value=\"{{ rv.isActive }}\" hint-placeholder-val=\"{{ true }}\"><span class=\"tag tag-accent\" style=\"flex:none\">Active<\u002Fspan><\u002Fsc-if>\n                <sc-if value=\"{{ rv.notActive }}\" hint-placeholder-val=\"{{ false }}\"><button class=\"btn btn-secondary\" sc-camel-on-click=\"{{ rv.onActivate }}\" style=\"flex:none;font-size:12px\">Make active<\u002Fbutton><\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fmain>\n<\u002Fdiv>\n\n<!-- APPLICATION DIALOG -->\n<sc-if value=\"{{ appDialogOpen }}\" hint-placeholder-val=\"{{ false }}\">\n  <div class=\"dialog-backdrop\" sc-camel-on-click=\"{{ closeAppDialog }}\">\n    <div class=\"dialog\" sc-camel-on-click=\"{{ stop }}\" style=\"width:min(460px,100%)\">\n      <div class=\"dialog-title\">{{ appDialogTitle }}<\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px\">\n        <div class=\"field\" style=\"margin:0\"><label>Company *<\u002Flabel><input class=\"input\" value=\"{{ draft.company }}\" sc-camel-on-input=\"{{ onDraftCompany }}\"><\u002Fdiv>\n        <div class=\"field\" style=\"margin:0\"><label>Role *<\u002Flabel><input class=\"input\" value=\"{{ draft.role }}\" sc-camel-on-input=\"{{ onDraftRole }}\"><\u002Fdiv>\n        <div class=\"field\" style=\"margin:0\"><label>Status<\u002Flabel>\n          <sc-raw-select class=\"input\" value=\"{{ draft.status }}\" sc-camel-on-change=\"{{ onDraftStatus }}\">\n            <option value=\"applied\">Applied<\u002Foption><option value=\"interviewing\">Interviewing<\u002Foption>\n            <option value=\"offer\">Offer<\u002Foption><option value=\"rejected\">Rejected<\u002Foption><option value=\"accepted\">Accepted<\u002Foption>\n          <\u002Fsc-raw-select><\u002Fdiv>\n        <div class=\"field\" style=\"margin:0\"><label>Applied date<\u002Flabel><input class=\"input\" type=\"date\" value=\"{{ draft.appliedDate }}\" sc-camel-on-input=\"{{ onDraftDate }}\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"field\" style=\"margin:0\"><label>Notes<\u002Flabel>{{ notesField }}<\u002Fdiv>\n      <sc-if value=\"{{ appDialogError }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-size:12.5px;color:var(--color-accent-700)\">Company and role are required.<\u002Fdiv><\u002Fsc-if>\n      <div class=\"dialog-actions\">\n        <button class=\"btn btn-secondary\" sc-camel-on-click=\"{{ closeAppDialog }}\">Cancel<\u002Fbutton>\n        <button class=\"btn btn-primary\" sc-camel-on-click=\"{{ saveApp }}\">Save application<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- DELETE CONFIRM -->\n<sc-if value=\"{{ deleteOpen }}\" hint-placeholder-val=\"{{ false }}\">\n  <div class=\"dialog-backdrop\" sc-camel-on-click=\"{{ cancelDelete }}\">\n    <div class=\"dialog\" sc-camel-on-click=\"{{ stop }}\">\n      <div class=\"dialog-title\">Delete this application?<\u002Fdiv>\n      <div class=\"dialog-body\">{{ deleteLabel }} will be removed. This can't be undone.<\u002Fdiv>\n      <div class=\"dialog-actions\">\n        <button class=\"btn btn-secondary\" sc-camel-on-click=\"{{ cancelDelete }}\">Cancel<\u002Fbutton>\n        <button class=\"btn btn-primary\" sc-camel-on-click=\"{{ confirmDelete }}\" style=\"color:var(--color-neutral-700);border-color:var(--color-neutral-500)\">Delete<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- EVENT DIALOG -->\n<sc-if value=\"{{ eventOpen }}\" hint-placeholder-val=\"{{ false }}\">\n  <div class=\"dialog-backdrop\" sc-camel-on-click=\"{{ closeEvent }}\">\n    <div class=\"dialog\" sc-camel-on-click=\"{{ stop }}\">\n      <div style=\"font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--color-accent)\">{{ eventTypeLabel }} · {{ eventDueText }}<\u002Fdiv>\n      <div class=\"dialog-title\" style=\"{{ eventStrike }}\">{{ eventTitle }}<\u002Fdiv>\n      <div class=\"dialog-body\">{{ eventDesc }}<br><br>Estimated {{ eventHours }} of focused work.<\u002Fdiv>\n      <div class=\"dialog-actions\">\n        <button class=\"btn btn-secondary\" sc-camel-on-click=\"{{ snoozeEvent }}\">Snooze a day<\u002Fbutton>\n        <button class=\"btn btn-primary\" sc-camel-on-click=\"{{ toggleEventComplete }}\">{{ eventCompleteLabel }}<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- TASK DIALOG -->\n<sc-if value=\"{{ taskOpen }}\" hint-placeholder-val=\"{{ false }}\">\n  <div class=\"dialog-backdrop\" sc-camel-on-click=\"{{ closeTask }}\">\n    <div class=\"dialog\" sc-camel-on-click=\"{{ stop }}\">\n      <div class=\"dialog-title\">Add a prep task<\u002Fdiv>\n      <div class=\"field\" style=\"margin:0\"><label>Task<\u002Flabel><input class=\"input\" value=\"{{ taskDraft.title }}\" sc-camel-on-input=\"{{ onTaskTitle }}\" placeholder=\"e.g. Practice SQL joins\"><\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px\">\n        <div class=\"field\" style=\"margin:0\"><label>Date<\u002Flabel><input class=\"input\" type=\"date\" value=\"{{ taskDraft.date }}\" sc-camel-on-input=\"{{ onTaskDate }}\"><\u002Fdiv>\n        <div class=\"field\" style=\"margin:0\"><label>Hours<\u002Flabel><input class=\"input\" type=\"number\" min=\"0.5\" step=\"0.5\" value=\"{{ taskDraft.hours }}\" sc-camel-on-input=\"{{ onTaskHours }}\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"dialog-actions\">\n        <button class=\"btn btn-secondary\" sc-camel-on-click=\"{{ closeTask }}\">Cancel<\u002Fbutton>\n        <button class=\"btn btn-primary\" sc-camel-on-click=\"{{ saveTask }}\">Add task<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- FLASH -->\n<sc-if value=\"{{ flash }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1815;color:#f4efe6;padding:12px 22px;border-radius:var(--radius-md);box-shadow:var(--shadow-lg);font-size:13.5px;font-family:var(--font-heading);font-weight:600;display:flex;align-items:center;gap:10px;z-index:50\">\n    <svg sc-camel-view-box=\"0 0 24 24\" width=\"16\" height=\"16\" fill=\"none\" stroke=\"var(--color-accent-300)\" stroke-width=\"2.2\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg>{{ flash }}<\u002Fdiv>\n<\u002Fsc-if>\n<\u002Fsc-if>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:860}}\">\nconst RECS = [\n  {id:'r1',company:'Northwind Capital',industry:'Finance',roleTitle:'Quantitative Research Intern',score:88,category:'good_fit',\n   reason:'You match 4 of 5 core skills — Python, Statistics, SQL and Pandas — and your momentum-backtesting project maps directly to the desk\\u2019s work.',\n   skills:['Python','Statistics','SQL','R','Pandas'],location:'New York, NY',salary:{min:9000,max:11000,unit:'/mo'},posted:'2026-07-11',deadline:'2026-08-08',\n   description:'The Quantitative Research team builds and tests systematic trading signals across equities and futures. As an intern you will prototype factor models in Python, run historical backtests, and present findings to portfolio managers. Strong grounding in statistics and comfort with large datasets expected; prior exposure to time-series analysis is a plus.'},\n  {id:'r2',company:'Helios Bio',industry:'Biotech',roleTitle:'Computational Biology Intern',score:82,category:'good_fit',\n   reason:'Your Python and ML skills cover the core stack; the genomics pipeline experience would be new but adjacent to your data-science background.',\n   skills:['Python','Genomics','Machine Learning','Linux'],location:'Boston, MA',salary:{min:7500,max:8500,unit:'/mo'},posted:'2026-07-09',deadline:'2026-08-01',\n   description:'Join a wet-lab-adjacent computational team analysing single-cell sequencing data. You will build reproducible analysis pipelines, apply clustering and dimensionality-reduction methods, and help interpret results alongside biologists. Comfort in a Unix environment and with large numerical datasets is essential.'},\n  {id:'r3',company:'Meridian Design Co.',industry:'Design',roleTitle:'Product Design Intern',score:79,category:'good_fit',\n   reason:'Your portfolio site and front-end work show real craft; you\\u2019d ramp on formal UX research, which the role provides mentoring for.',\n   skills:['Figma','Prototyping','UX Research','HTML/CSS'],location:'Remote',salary:{min:5000,max:6000,unit:'/mo'},posted:'2026-07-05',deadline:'2026-07-30',\n   description:'Work with a small product team shipping a B2B analytics tool. You will move from wireframes to high-fidelity prototypes in Figma, run lightweight usability sessions, and hand off specs to engineers. We look for taste, curiosity, and an ability to defend design decisions with evidence.'},\n  {id:'r4',company:'Atlas Logistics',industry:'Operations',roleTitle:'Data Analyst Intern',score:76,category:'good_fit',\n   reason:'SQL, Excel and Tableau are all on your résumé — a comfortable fit with room to grow into forecasting work.',\n   skills:['SQL','Excel','Tableau','Python'],location:'Chicago, IL',salary:{min:5500,max:6500,unit:'/mo'},posted:'2026-07-12',deadline:'2026-08-12',\n   description:'The analytics group turns fleet and warehouse data into operational decisions. You will write SQL against a large warehouse, build Tableau dashboards for regional managers, and support ad-hoc forecasting requests. A pragmatic, detail-oriented approach matters more than exotic tooling.'},\n  {id:'r5',company:'Vireo Media',industry:'Journalism',roleTitle:'Editorial Data Intern',score:68,category:'stretch',\n   reason:'Your analytical background transfers, but newsroom tooling and CMS workflows would be a step outside your usual stack.',\n   skills:['Writing','Research','SQL','Data Viz'],location:'Remote',salary:{min:3500,max:4500,unit:'/mo'},posted:'2026-07-03',deadline:'2026-07-28',\n   description:'A digital newsroom seeks an intern to support data-driven reporting. You will clean public datasets, build charts for stories, and work with reporters on interactive graphics. Curiosity about the news and clear written communication are as important as technical skill.'},\n  {id:'r6',company:'Cobalt Robotics',industry:'Hardware',roleTitle:'Embedded Systems Intern',score:64,category:'stretch',\n   reason:'Python overlaps, but the role leans on C++ and RTOS experience you haven\\u2019t logged yet — a genuine stretch worth the reach.',\n   skills:['C++','RTOS','Electronics','Python'],location:'Austin, TX',salary:{min:6000,max:7000,unit:'/mo'},posted:'2026-06-30',deadline:'2026-07-25',\n   description:'Help bring autonomous security robots to life. You will write firmware for motor and sensor subsystems, debug on real hardware, and contribute to the control loop. Experience with C/C++ on microcontrollers strongly preferred; a willingness to get hands dirty is required.'},\n  {id:'r7',company:'Summit Consulting',industry:'Consulting',roleTitle:'Strategy Analyst Intern',score:58,category:'stretch',\n   reason:'Your quantitative rigour is a plus, though the role weighs client communication and slide-craft heavily — areas to develop.',\n   skills:['Excel','PowerPoint','Modeling','Communication'],location:'San Francisco, CA',salary:{min:7000,max:8000,unit:'/mo'},posted:'2026-07-01',deadline:'2026-08-05',\n   description:'Support case teams solving growth and operations problems for mid-market clients. You will build financial models, structure analyses, and craft client-ready presentations. We value structured thinking and the poise to present to senior stakeholders.'},\n  {id:'r8',company:'Aperture AI',industry:'Artificial Intelligence',roleTitle:'ML Research Intern',score:47,category:'long_shot',\n   reason:'A reach role: it expects graduate-level familiarity with PyTorch internals and CUDA that goes beyond your current coursework.',\n   skills:['PyTorch','Deep Learning','Mathematics','CUDA'],location:'Remote',salary:{min:8000,max:10000,unit:'/mo'},posted:'2026-06-28',deadline:'2026-07-22',\n   description:'Contribute to research on efficient transformer training. You will run experiments, implement paper methods in PyTorch, and profile GPU workloads. Prior research experience and strong mathematical maturity are expected — ambitious applicants welcome.'},\n  {id:'r9',company:'Lumen Architecture',industry:'Architecture',roleTitle:'Computational Design Intern',score:41,category:'long_shot',\n   reason:'An interest-led reach: the parametric-design tooling (Rhino, Grasshopper) is entirely new territory for you.',\n   skills:['Rhino','Grasshopper','Rendering','GIS'],location:'Seattle, WA',salary:{min:3000,max:4000,unit:'/mo'},posted:'2026-06-25',deadline:'2026-07-20',\n   description:'A design studio explores generative approaches to urban form. You will script parametric models in Grasshopper, produce renderings, and support GIS-based site analysis. A design sensibility and eagerness to learn new tools matter most.'},\n];\n\nconst MON = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];\nconst MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];\nconst STATUS = {\n  applied:{label:'Applied',cls:'tag tag-neutral'},\n  interviewing:{label:'Interviewing',cls:'tag tag-accent'},\n  offer:{label:'Offer',cls:'tag tag-accent-2'},\n  accepted:{label:'Accepted',cls:'tag tag-accent'},\n  rejected:{label:'Rejected',cls:'tag tag-outline'},\n  declined:{label:'Declined',cls:'tag tag-outline'},\n};\n\nclass Component extends DCLogic {\n  state = {\n    authed:false, authMode:'login', view:'dashboard',\n    findTab:'good_fit',\n    filters:{location:'',skill:'',company:'',sort:'score'},\n    expandedRec:null,\n    apps:[\n      {id:'a1',company:'Northwind Capital',role:'Quantitative Research Intern',status:'interviewing',appliedDate:'2026-06-28',notes:'Passed the online assessment. First-round with a quant researcher on the 24th — brushing up on probability puzzles.',interviews:['Jul 24, 2026 — Technical round'],updated:'2026-07-15'},\n      {id:'a2',company:'Helios Bio',role:'Computational Biology Intern',status:'applied',appliedDate:'2026-07-05',notes:'Applied through their careers page. Referred by a lab TA.',interviews:[],updated:'2026-07-05'},\n      {id:'a3',company:'Meridian Design Co.',role:'Product Design Intern',status:'offer',appliedDate:'2026-06-10',notes:'Verbal offer received — $5.5k/mo, remote. Deciding by the 25th.',interviews:['Jun 20 — Portfolio review','Jun 27 — Team fit'],updated:'2026-07-14'},\n      {id:'a4',company:'Vireo Media',role:'Editorial Data Intern',status:'rejected',appliedDate:'2026-05-30',notes:'Rejected after the first round. Feedback: wanted stronger newsroom examples. Worth building a data-story sample.',interviews:['Jun 12 — Editor screen'],updated:'2026-06-18'},\n      {id:'a5',company:'Atlas Logistics',role:'Data Analyst Intern',status:'applied',appliedDate:'2026-07-12',notes:'Straightforward application. Tailored résumé to emphasise Tableau work.',interviews:[],updated:'2026-07-12'},\n    ],\n    appFilter:'all', appSort:'date', expandedApp:null,\n    appDialog:{open:false,mode:'add',id:null,error:false},\n    draft:{company:'',role:'',status:'applied',appliedDate:'2026-07-19',notes:''},\n    deleteId:null,\n    calDate:new Date(2026,6,19), calView:'monthly',\n    events:[\n      {id:'e1',title:'Review data structures',type:'general',date:'2026-07-14',hours:2,completed:true},\n      {id:'e2',title:'Practice coding problems',type:'interview',date:'2026-07-16',hours:3,completed:true},\n      {id:'e3',title:'Read a system-design primer',type:'general',date:'2026-07-18',hours:1.5,completed:true},\n      {id:'e4',title:'Mock behavioural interview',type:'interview',date:'2026-07-20',hours:2,completed:false},\n      {id:'e5',title:'SQL window functions',type:'interview',date:'2026-07-21',hours:2,completed:false},\n      {id:'e6',title:'Coffee chat — Northwind analyst',type:'custom',date:'2026-07-23',hours:1,completed:false},\n      {id:'e7',title:'System design: rate limiter',type:'interview',date:'2026-07-24',hours:3,completed:false},\n      {id:'e8',title:'Northwind onsite prep',type:'interview',date:'2026-07-24',hours:2,completed:false},\n      {id:'e9',title:'Practice coding problems',type:'general',date:'2026-07-27',hours:2,completed:false},\n      {id:'e10',title:'Update portfolio site',type:'custom',date:'2026-07-30',hours:2,completed:false},\n    ],\n    eventId:null,\n    task:{open:false,title:'',date:'2026-07-22',hours:2},\n    resumes:[\n      {id:'v3',name:'Spandan_Resume_2026.pdf',uploaded:'2026-07-08',active:true,\n        skills:['Python','SQL','Statistics','Pandas','R','Git','Tableau'],interests:['Data Science','Machine Learning','Backend','Quant Finance']},\n      {id:'v2',name:'Resume_Spring2026.pdf',uploaded:'2026-03-14',active:false,skills:[],interests:[]},\n      {id:'v1',name:'Resume_v1.pdf',uploaded:'2026-01-20',active:false,skills:[],interests:[]},\n    ],\n    flash:null,\n    showcaseScene:0,\n  };\n  _flashT = null;\n  _showcaseT = null;\n\n  componentDidMount(){\n    this._showcaseT = setInterval(()=>{\n      if(this.state.authed) return;\n      this.setState(s=>({showcaseScene:(s.showcaseScene+1)%3}));\n    }, 3600);\n    this._io = new IntersectionObserver((entries)=>{\n      entries.forEach(e=>{ if(e.isIntersecting){ e.target.setAttribute('data-in','1'); this._io.unobserve(e.target); } });\n    }, {threshold:0.12, rootMargin:'0px 0px -6% 0px'});\n    setTimeout(()=>this._observe(), 80);\n  }\n  componentDidUpdate(){ this._observe(); }\n  _observe(){ if(!this._io) return; document.querySelectorAll('.fw-reveal:not([data-obs])').forEach(el=>{ el.setAttribute('data-obs','1'); this._io.observe(el); }); }\n  componentWillUnmount(){
